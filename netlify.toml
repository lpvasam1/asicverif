[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # Generation can take 30-60s; give it headroom
  node_bundler = "esbuild"

[functions."generate"]
  timeout = 120

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
